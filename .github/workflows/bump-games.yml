name: Bump @keenple/shared in game repos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'shared version tag (e.g. v2.0.0-alpha.15)'
        required: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Discover game repos
        id: list
        env:
          GH_TOKEN: ${{ secrets.GAMES_PAT }}
        run: |
          # keenple-* 중 shared/main/game-template 제외한 모든 레포를 게임으로 간주
          REPOS=$(gh api orgs/Keenple/repos --paginate \
            --jq '[.[] | .name | select(startswith("keenple-")) | select(. != "keenple-shared" and . != "keenple-main" and . != "keenple-game-template")]' \
            | jq -c .)
          echo "repos=$REPOS" >> $GITHUB_OUTPUT
          echo "Targets: $REPOS"

  bump:
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.repos != '[]'
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.repos) }}
    steps:
      - name: Checkout game repo
        uses: actions/checkout@v4
        with:
          repository: Keenple/${{ matrix.repo }}
          token: ${{ secrets.GAMES_PAT }}
          path: game

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if @keenple/shared not used
        id: check
        working-directory: game
        run: |
          if ! grep -q '"@keenple/shared"' package.json 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Repo does not depend on @keenple/shared — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump @keenple/shared
        if: steps.check.outputs.skip == 'false'
        working-directory: game
        run: |
          VER="${{ needs.discover.outputs.version }}"
          npm install "@keenple/shared@github:Keenple/keenple-shared#${VER}" --save || true

      - name: Create PR
        if: steps.check.outputs.skip == 'false'
        working-directory: game
        env:
          GH_TOKEN: ${{ secrets.GAMES_PAT }}
        run: |
          VER="${{ needs.discover.outputs.version }}"
          BRANCH="auto/bump-shared-${VER}"

          if git diff --quiet package.json package-lock.json 2>/dev/null; then
            echo "No diff — already on ${VER}, skipping PR"
            exit 0
          fi

          git config user.name "keenple-bot"
          git config user.email "bot@keenple.com"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "[chore] bump @keenple/shared to ${VER}"
          git push -u origin "$BRANCH" --force

          PR_URL=$(gh pr create \
            --title "[chore] bump @keenple/shared to ${VER}" \
            --body "Auto-generated by keenple-shared release \`${VER}\`. Will auto-merge once CI passes." \
            --head "$BRANCH" \
            --base main 2>&1 | tail -1) || PR_URL=$(gh pr view "$BRANCH" --json url -q .url)

          # Free 플랜 조직은 GitHub auto-merge 불가 → workflow가 직접 즉시 머지
          gh pr merge "$BRANCH" --squash --delete-branch || echo "merge failed — PR open for manual merge"
          echo "PR: $PR_URL"
